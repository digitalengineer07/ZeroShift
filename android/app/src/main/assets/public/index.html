<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F4F7F6">
    <link rel="manifest" href="manifest.json">
    <title>ZeroShift | Tile Puzzle Solver</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-layout">
        <header class="app-header">
            <h1 class="title">Zero<span>Shift</span></h1>
            <p style="color: var(--text-secondary); margin-top: 5px; font-size: 1.05rem; font-weight: 500;">
                Moving tiles by shifting the empty space
            </p>
        </header>

        <div class="dashboard-grid">
            
            <!-- Center Stage: The Live Game -->
            <section class="live-stage panel-card">
                <div class="stage-header">
                    <h2>Live Playable Board</h2>
                    <div class="stats-mini">
                        <div class="stat-pill">Time: <b id="stat-timer">00:00</b></div>
                        <div class="stat-pill">Moves: <b id="stat-moves">0</b> / <span id="stat-limit" class="stat-limit-text">∞</span></div>
                        <div class="stat-pill">Cost f(n): <b id="stat-cost">0</b></div>
                        <div class="stat-pill">Explored: <b id="stat-explored">0</b></div>
                    </div>
                </div>
                
                <div class="board-wrapper-large">
                    <div id="game-board" class="game-board playable">
                        <!-- Tiles injected by JS -->
                    </div>
                </div>
                
                <div id="message-box" class="message-box hidden"></div>
                
                <div class="playback-controls">
                    <div class="btn-group">
                        <button id="btn-solve" class="btn btn-secondary" title="Solve from wherever you are right now">🎯 AI Solve Current</button>
                        <button id="btn-solve-start" class="btn btn-success" title="Reset puzzle to original state and solve">🔙 AI Solve from Start</button>
                    </div>
                    <div class="btn-group" id="auto-play-group">
                        <button id="btn-play" class="btn btn-primary flex-2" disabled>▶ Play Animation</button>
                        <button id="btn-pause" class="btn btn-warning flex-2" style="display: none;" >⏸ Pause (Push)</button>
                        <button id="btn-resume" class="btn btn-success flex-2" style="display: none;" >▶ Resume Animation</button>
                        <button id="btn-next" class="btn btn-outline flex-1" disabled>⏭ Next</button>
                    </div>
                </div>
            </section>

            <!-- Right Side: Goal, Controls, Path -->
            <section class="sidebar">
                
                <!-- Controls Card -->
                <div class="controls-card panel-card">
                    <button id="btn-start-game" class="btn btn-success btn-block mb-3">▶ START GAME</button>
                    <button id="btn-end-game" class="btn btn-error btn-block mb-3" style="display: none;">🛑 GIVE UP</button>

                    <div class="diff-grid mb-3">
                        <button id="btn-easy" class="btn btn-outline diff-btn">Easy</button>
                        <button id="btn-medium" class="btn btn-outline diff-btn">Medium</button>
                        <button id="btn-hard" class="btn btn-primary diff-btn active">Hard</button>
                    </div>
                    
                    <div class="custom-input-group mb-3">
                        <select id="timer-select" class="form-select">
                            <option value="60">⏳ Fast: 1:00 Min Limit</option>
                            <option value="120" selected>⏳ Normal: 2:00 Min Limit</option>
                            <option value="180">⏳ Relaxed: 3:00 Min Limit</option>
                            <option value="300">⏳ Long: 5:00 Min Limit</option>
                            <option value="0">⏱️ Practice: Count Up</option>
                        </select>
                    </div>
                    
                    <div class="custom-input-group">
                        <input type="text" id="input-state" value="1,2,3,4,5,6,7,8,0" placeholder="1,2,3,4,5,6,7,8,0">
                        <button id="btn-shuffle-input" class="btn btn-small btn-warning">Shuffle</button>
                        <button id="btn-set-state" class="btn btn-small">Set</button>
                        <button id="btn-reset" class="btn btn-small btn-outline">Reset</button>
                    </div>
                </div>

                <!-- Goal Card -->
                <div class="goal-card panel-card">
                    <div class="sidebar-header">
                        <h3>Goal State</h3>
                        <button id="btn-randomize-goal" class="btn btn-outline btn-small">Shuffle Goal</button>
                    </div>
                    <div class="board-wrapper-small">
                        <div id="goal-board" class="game-board static small-board">
                        </div>
                    </div>
                </div>

                <!-- Path Card -->
                <div class="path-card panel-card">
                    <h3>Solution Path Activity</h3>
                    <div class="path-scroll" id="path-list">
                        <div class="empty-path">Live moves will be recorded here.<br><br>Play manually or use the AI Solver!</div>
                    </div>
                </div>

            </section>

        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
